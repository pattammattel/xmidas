[workspace]
authors = ["Ajith Pattammattel <pattammattel@bnl.gov>"]
channels = ["conda-forge"]
name = "xmidas"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
h5py = ">=3.15.1,<4"
numpy = ">=2.4.2,<3"
pandas = ">=3.0.0,<4"
scikit-image = ">=0.26.0,<0.27"
scikit-learn = ">=1.8.0,<2"
scipy = ">=1.17.0,<2"
tifffile = ">=2026.1.28,<2027"
packaging = ">=26.0,<27"

[pypi-dependencies]
pyqt6 = ">=6.10.2, <7"
pystackreg = ">=0.2.8, <0.3"
xraydb = ">=4.5.8, <5"
pyqtgraph = ">=0.14.0, <0.15"
